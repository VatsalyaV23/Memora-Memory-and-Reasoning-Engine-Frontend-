version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: org-memory-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_docker
      POSTGRES_DB: org_memory
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d org_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - org-memory-network
    restart: unless-stopped

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: org-memory-chromadb
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: 'TRUE'
      PERSIST_DIRECTORY: /chroma_data
    volumes:
      - chromadb_data:/chroma_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - org-memory-network
    restart: unless-stopped

volumes:
  postgres_data:
  chromadb_data:

networks:
  org-memory-network:
    driver: bridge