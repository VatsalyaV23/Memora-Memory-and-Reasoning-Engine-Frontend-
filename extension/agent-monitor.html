<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Monitor - Real-Time Activity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Courier New', monospace;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(90deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
      border-bottom: 2px solid rgba(102, 126, 234, 0.5);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header h1 {
      font-size: 24px;
      color: #667eea;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #28a745;
      animation: pulse 2s infinite;
      box-shadow: 0 0 10px rgba(40, 167, 69, 0.5);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-right {
      display: flex;
      gap: 10px;
      font-size: 12px;
    }

    .time-display {
      background: rgba(102, 126, 234, 0.1);
      padding: 6px 12px;
      border-radius: 4px;
      color: #667eea;
      font-weight: bold;
    }

    /* Main Content */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 20px;
      padding: 20px;
    }

    /* Stats Panel */
    .stats-panel {
      width: 250px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 8px;
      padding: 15px;
      overflow-y: auto;
    }

    .stat-item {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(102, 126, 234, 0.2);
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      color: #667eea;
      font-weight: bold;
      font-family: 'Monaco', monospace;
    }

    .stat-unit {
      font-size: 12px;
      color: #666;
      margin-left: 5px;
    }

    /* Activity Log */
    .activity-panel {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .activity-header {
      font-size: 12px;
      color: #667eea;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(102, 126, 234, 0.3);
    }

    .activity-log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }

    .log-entry {
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(102, 126, 234, 0.1);
      border-left: 3px solid #667eea;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .log-time {
      color: #888;
      font-size: 10px;
      font-weight: bold;
    }

    .log-action {
      color: #667eea;
      margin: 2px 0;
      font-weight: bold;
    }

    .log-detail {
      color: #aaa;
      margin: 2px 0;
      word-break: break-word;
    }

    .log-success {
      border-left-color: #28a745;
      background: rgba(40, 167, 69, 0.1);
    }

    .log-success .log-action {
      color: #28a745;
    }

    .log-error {
      border-left-color: #dc3545;
      background: rgba(220, 53, 69, 0.1);
    }

    .log-error .log-action {
      color: #dc3545;
    }

    .log-info {
      border-left-color: #17a2b8;
      background: rgba(23, 162, 184, 0.1);
    }

    .log-info .log-action {
      color: #17a2b8;
    }

    .log-warning {
      border-left-color: #ffc107;
      background: rgba(255, 193, 7, 0.1);
    }

    .log-warning .log-action {
      color: #ffc107;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(102, 126, 234, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.4);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(102, 126, 234, 0.6);
    }

    /* Footer */
    .footer {
      background: rgba(102, 126, 234, 0.1);
      border-top: 1px solid rgba(102, 126, 234, 0.3);
      padding: 10px 20px;
      font-size: 11px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    .footer-btn {
      background: rgba(102, 126, 234, 0.2);
      border: 1px solid rgba(102, 126, 234, 0.4);
      color: #667eea;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.3s;
    }

    .footer-btn:hover {
      background: rgba(102, 126, 234, 0.3);
      border-color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="status-indicator"></div>
        <h1>🤖 AGENT MONITOR</h1>
      </div>
      <div class="header-right">
        <div class="time-display" id="time-display">00:00:00</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Stats Panel -->
      <div class="stats-panel">
        <div class="stat-item">
          <div class="stat-label">Total Captures</div>
          <div class="stat-value" id="stat-captures">0</div>
        </div>

        <div class="stat-item">
          <div class="stat-label">Decisions Extracted</div>
          <div class="stat-value" id="stat-decisions">0</div>
        </div>

        <div class="stat-item">
          <div class="stat-label">Questions Answered</div>
          <div class="stat-value" id="stat-questions">0</div>
        </div>

        <div class="stat-item">
          <div class="stat-label">Database Status</div>
          <div style="color: #28a745; font-weight: bold; margin-top: 5px;">✓ Connected</div>
        </div>

        <div class="stat-item">
          <div class="stat-label">Avg Response Time</div>
          <div>
            <span class="stat-value" id="stat-response">0</span>
            <span class="stat-unit">ms</span>
          </div>
        </div>

        <div class="stat-item">
          <div class="stat-label">Backend</div>
          <div id="backend-status" style="color: #28a745; font-weight: bold; margin-top: 5px;">✓ Online</div>
        </div>
      </div>

      <!-- Activity Log -->
      <div class="activity-panel">
        <div class="activity-header">📋 Real-Time Activity Log</div>
        <div class="activity-log" id="activity-log">
          <div class="log-entry log-info">
            <div class="log-time">System Started</div>
            <div class="log-action">INITIALIZATION</div>
            <div class="log-detail">Agent monitor listening for activity...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Org Memory Engine - Agent Monitor v1.0</span>
      <div>
        <button class="footer-btn" id="clear-btn">Clear Log</button>
        <button class="footer-btn" id="export-btn">Export</button>
      </div>
    </div>
  </div>

  <script src="agent-monitor.js"></script>
</body>
</html>
